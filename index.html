<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* CONFIGURACIÓN DEL FONDO PROFESIONAL */
    body { 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      /* Imagen de fondo médica con superposición para legibilidad */
      background: linear-gradient(rgba(0, 74, 153, 0.8), rgba(255, 255, 255, 0.9)), 
                  url('https://i.pinimg.com/1200x/59/28/8a/59288a01b5f6cb5b28045334ad513f33.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* CONTENEDOR TIPO TARJETA */
    .card { 
      background: rgba(255, 255, 255, 0.98); 
      padding: 40px; 
      border-radius: 25px; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
      width: 90%; 
      max-width: 450px; 
      text-align: center;
      border-top: 10px solid #004a99;
      position: relative;
    }

    h2 { color: #004a99; margin: 0; font-size: 26px; font-weight: 800; }
    .subtitle { color: #555; font-size: 13px; margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase; }

    /* BANNER DE ADVERTENCIA AUTOMÁTICA */
    .banner { 
      background: #fff3cd; 
      color: #856404; 
      padding: 15px; 
      border-radius: 12px; 
      font-size: 13px; 
      margin-bottom: 25px; 
      border-left: 5px solid #ffc107;
      text-align: left;
      line-height: 1.5;
    }

    input { 
      width: 100%; 
      padding: 15px; 
      margin-bottom: 20px; 
      border: 2px solid #e0e0e0; 
      border-radius: 12px; 
      font-size: 16px; 
      box-sizing: border-box;
      transition: all 0.3s ease;
    }
    input:focus { border-color: #004a99; outline: none; box-shadow: 0 0 10px rgba(0,74,153,0.1); }

    button { 
      background: #004a99; 
      color: white; 
      border: none; 
      padding: 16px; 
      border-radius: 12px; 
      cursor: pointer; 
      font-weight: bold; 
      width: 100%; 
      font-size: 16px;
      box-shadow: 0 5px 15px rgba(0,74,153,0.3);
      transition: all 0.3s ease;
    }
    button:hover { background: #003366; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,74,153,0.4); }

    #status { margin-top: 20px; font-weight: bold; color: #004a99; min-height: 20px; }

    /* ESTILO DE LA TABLA DE RESULTADOS */
    table { width: 100%; margin-top: 30px; border-collapse: collapse; }
    td { padding: 15px 10px; border-bottom: 1px solid #f0f0f0; text-align: left; vertical-align: middle; }
    
    .btn-pdf { 
      background: #28a745; 
      color: white; 
      text-decoration: none; 
      padding: 10px 15px; 
      border-radius: 8px; 
      font-size: 12px; 
      font-weight: bold;
      display: inline-block;
    }
    .btn-pdf:hover { background: #218838; }

    .vencimiento { color: #d9534f; font-size: 11px; display: block; margin-top: 5px; font-weight: bold; }
    
    .footer { margin-top: 30px; font-size: 11px; color: #999; }
  </style>
<meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/7918/7918240.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/7918/7918240.png">
    
    <meta name="apple-mobile-web-app-title" content="GSYSTEM">
    <meta name="theme-color" content="#004a99">
    ```
</head>
<body>

<<div class="card">
  <img src="https://png.pngtree.com/element_our/png/20180917/microscope-simple-icon-illustration-vector-sign-on-isolated-background-png_99498.jpg" alt="Logo" style="width: 150px; margin-bottom: 10px;">
  
  <h2>PORTAL GLOBAL SYSTEM</h2>
  <div class="subtitle">Sistema de Gestión y Control de Resultados</div>

  <div class="banner">
    <strong>⚠️ INFORMACIÓN IMPORTANTE:</strong><br>
    Sus exámenes médicos son privados. Por seguridad, se eliminan del portal automáticamente a los <strong>15 días</strong>.
  </div>

  <input type="text" id="cedula" placeholder="Ingrese Cédula del Paciente">
  <button onclick="consultar()">BUSCAR RESULTADOS</button>

  <div id="status"></div>
  <div id="resultado"></div>
  
  <div class="footer">© 2026 GSYSTEM Laboratorio Online</div>
</div>

<script>
  function consultar() {
    var cedula = document.getElementById('cedula').value;
    var status = document.getElementById('status');
    var resultadoDiv = document.getElementById('resultado');

    if (!cedula.trim()) {
      status.innerHTML = "❌ Ingrese su cédula para buscar";
      return;
    }

    status.innerHTML = "⏳ Consultando base de datos...";
    resultadoDiv.innerHTML = "";

    google.script.run
      .withSuccessHandler(function(lista) {
        status.innerHTML = "";
        if (lista.length === 0) {
          status.innerHTML = "No se hallaron resultados para esta cédula.";
          return;
        }

        var html = '<table>';
        lista.forEach(function(item) {
          html += '<tr>' +
            '<td>' + item.nombre + 
            '<span class="vencimiento">⏳ Disponible por ' + item.vigencia + ' días más</span></td>' +
            '<td style="text-align:right"><a class="btn-pdf" href="' + item.url + '" target="_blank">VER PDF</a></td>' +
            '</tr>';
        });
        html += '</table>';
        resultadoDiv.innerHTML = html;
      })
      .withFailureHandler(function(err) {
        status.innerHTML = "❌ Error: No se pudo conectar al servidor.";
      })
      .buscarArchivo(cedula);
  }
</script>

</body>
</html>
